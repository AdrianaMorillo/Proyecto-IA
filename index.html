<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber-Gen V15.2 - Adriana Morillo</title>

  <!-- Bootstrap 5 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <!-- Prism.js -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/themes/prism-tomorrow.min.css" rel="stylesheet">
  <!-- Estilos propios -->
  <link rel="stylesheet" href="style.css">
</head>
<body>

<button class="cyber-btn-icon" id="toggle-sidebar"><i class="fas fa-bars"></i></button>

<div class="cyber-container">
  <aside class="cyber-sidebar collapsed" id="sidebar">
    <div class="sidebar-header">
      <h4><i class="fas fa-microchip"></i> CYBER-GRID</h4>
      <button class="btn-close-sidebar" id="close-sidebar"><i class="fas fa-times"></i></button>
    </div>
    <nav class="sidebar-nav">
      <button class="nav-item active" data-chat-id="main"><i class="fas fa-comments"></i> Terminal Principal</button>
      <div class="nav-divider"></div>
      <h6 class="nav-label">HISTORIAL NEURAL</h6>
      <div id="chat-history-list"></div>
      <div class="nav-divider"></div>
      <button class="nav-item" id="new-chat-btn"><i class="fas fa-plus-circle"></i> Nuevo Diálogo</button>
    </nav>
  </aside>

  <main class="cyber-main">
    <header class="cyber-header">
      <div class="header-left">
        <h2>CYBER-GEN <span class="v-tag">V15.2</span></h2>
        <div class="model-status">
          <span class="status-dot"></span> 
          <span id="current-model-name">Nucleo Activo</span>
        </div>
      </div>
      <div class="header-right">
        <button class="cyber-btn-icon" id="toggle-audio" title="Activar/Desactivar Voz"><i class="fas fa-volume-up"></i></button>
        <button class="cyber-btn-icon" id="clear-chat" title="Limpiar Terminal"><i class="fas fa-trash-alt"></i></button>
      </div>
    </header>

    <div class="chat-viewport" id="chat-container">
      <div class="welcome-screen">
        <div class="cyber-logo-anim">
          <i class="fas fa-brain"></i>
        </div>
        <h1>Bienvenido al Futuro</h1>
        <p>Conexión neuronal establecida con el Ing. Juancito Peña</p>
        <small>🔒 Modo Seguro: API Key protegida vía .env</small>
      </div>
    </div>

    <div id="chart-panel" class="d-none">
      <canvas id="myChart"></canvas>
    </div>

    <footer class="cyber-footer">
      <div class="input-wrapper">
        <div class="action-buttons">
          <button class="action-btn" id="voice-btn" title="Dictado por Voz"><i class="fas fa-microphone"></i></button>
          <label class="action-btn" title="Subir Archivo (Excel/PDF)">
            <i class="fas fa-paperclip"></i>
            <input type="file" id="file-input" hidden accept=".xlsx, .xls, .pdf, .csv">
          </label>
          <select id="model-selector" class="model-selector" title="Seleccionar Modelo IA">
            <option value="gemini-1.5-flash">⚡ Gemini 1.5 Flash</option>
            <option value="gemini-1.5-pro">🧠 Gemini 1.5 Pro</option>
            <option value="gemini-2.0-flash-exp">🚀 Gemini 2.0 Flash</option>
          </select>
        </div>
        <textarea id="user-input" placeholder="Escribe tu comando o pregunta..." rows="1"></textarea>
        <button class="send-btn" id="send-btn"><i class="fas fa-paper-plane"></i></button>
      </div>
    </footer>
  </main>
</div>

<!-- Librerías -->
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/prism/1.29.0/prism.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script type="module" src="main.js"></script>
</body>
</html>
