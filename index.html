<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CYBER-GEN V12: TERMINAL MULTIMODAL</title>
    <style>
        /* CSS PURO - ESTÉTICA CYBERPUNK */
        :root {
            --neon: #00f2ff;
            --bg: #050505;
            --panel: #0d0d0d;
            --user-glow: #0062ff;
        }

        body {
            background: var(--bg);
            color: #e0e0e0;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Terminal Header */
        header {
            padding: 15px;
            background: var(--panel);
            border-bottom: 2px solid var(--neon);
            text-align: center;
            box-shadow: 0 0 15px var(--neon);
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        /* Chat Viewport */
        #chat-container {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/carbon-fibre.png');
        }

        .message {
            max-width: 80%;
            padding: 12px;
            border-radius: 5px;
            position: relative;
            line-height: 1.4;
            word-wrap: break-word;
        }

        .user-message {
            align-self: flex-end;
            background: rgba(0, 98, 255, 0.2);
            border: 1px solid var(--user-glow);
            box-shadow: -2px 2px 10px var(--user-glow);
        }

        .ai-message {
            align-self: flex-start;
            background: rgba(0, 242, 255, 0.1);
            border: 1px solid var(--neon);
            box-shadow: 2px 2px 10px var(--neon);
        }

        /* Preview de imagen seleccionada */
        #preview-container {
            display: none;
            padding: 10px;
            background: #111;
            border-top: 1px solid var(--neon);
        }
        #img-preview {
            height: 60px;
            border: 1px solid var(--neon);
        }

        /* Input Area */
        footer {
            padding: 15px;
            background: var(--panel);
            display: flex;
            gap: 10px;
            align-items: center;
        }

        textarea {
            flex: 1;
            background: #000;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px;
            resize: none;
            outline: none;
        }

        .btn {
            background: transparent;
            border: 1px solid var(--neon);
            color: var(--neon);
            padding: 10px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: var(--neon);
            color: #000;
            box-shadow: 0 0 15px var(--neon);
        }

        .img-input-label {
            font-size: 20px;
            cursor: pointer;
            color: var(--neon);
        }

        /* Animación de carga */
        .loading {
            font-style: italic;
            color: #888;
        }
    </style>
</head>
<body>

<header>
    > CYBER-GEN MASTER V12 // CONEXIÓN NEURONAL_
</header>

<div id="chat-container">
    <div class="message ai-message">SISTEMA INICIADO. Esperando comandos de texto o análisis visual...</div>
</div>

<div id="preview-container">
    <img id="img-preview" src="" alt="Vista previa">
    <button class="btn" onclick="clearImage()" style="padding: 2px 5px; font-size: 10px;">X</button>
</div>

<footer>
    <label class="img-input-label" title="Subir Imagen">
        📷
        <input type="file" id="file-input" hidden accept="image/*">
    </label>
    <textarea id="user-input" placeholder="Escribe comando..." rows="1"></textarea>
    <button class="btn" id="send-btn">ENVIAR</button>
</footer>

<script>
    // 1. TU CLAVE
    const API_KEY = "AIzaSyBFvBG-u0pwyrghgjJdd6bxWZ-9TYMlPIg"; 
    
    // 2. USAMOS EL MODELO LITE DE TU LISTA (Es el que menos falla por cuota)
    const MODEL = "gemini-2.5-flash"; 

    const chatContainer = document.getElementById('chat-container');
    const userInput = document.getElementById('user-input');
    const sendBtn = document.getElementById('send-btn');
    const fileInput = document.getElementById('file-input');
    const previewContainer = document.getElementById('preview-container');
    const imgPreview = document.getElementById('img-preview');

    let selectedImageBase64 = null;

    fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
            selectedImageBase64 = event.target.result.split(',')[1];
            imgPreview.src = event.target.result;
            previewContainer.style.display = 'block';
        };
        reader.readAsDataURL(file);
    };

    function clearImage() {
        selectedImageBase64 = null;
        previewContainer.style.display = 'none';
        fileInput.value = '';
    }

    function addMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message ${role}-message`;
        div.innerText = text;
        chatContainer.appendChild(div);
        chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    async function handleSend() {
        const text = userInput.value.trim();
        if (!text && !selectedImageBase64) return;

        addMessage('user', text + (selectedImageBase64 ? " [Imagen]" : ""));
        
        const loadingDiv = document.createElement('div');
        loadingDiv.className = 'message ai-message';
        loadingDiv.innerText = "Conectando con el núcleo " + MODEL + "...";
        chatContainer.appendChild(loadingDiv);

        const payload = {
            contents: [{
                parts: [{ text: text || "Analiza esta imagen" }]
            }]
        };

        if (selectedImageBase64) {
            payload.contents[0].parts.push({
                inline_data: { mime_type: "image/jpeg", data: selectedImageBase64 }
            });
        }

        try {
            // Usamos v1beta que es la necesaria para los modelos 2.0 y 2.5 de tu lista
            const url = `https://generativelanguage.googleapis.com/v1beta/models/${MODEL}:generateContent?key=${API_KEY}`;
            
            const res = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await res.json();
            if (chatContainer.contains(loadingDiv)) chatContainer.removeChild(loadingDiv);

            if (data.error) {
                // Si el Lite también te da limit 0, probamos el 2.5-flash-lite automáticamente
                addMessage('ai', "ESTADO: " + data.error.message);
                console.log("Error detallado:", data.error);
            } else if (data.candidates && data.candidates[0].content.parts[0].text) {
                addMessage('ai', data.candidates[0].content.parts[0].text);
            }
        } catch (err) {
            if (chatContainer.contains(loadingDiv)) chatContainer.removeChild(loadingDiv);
            addMessage('ai', "ERROR DE CONEXIÓN.");
        }

        userInput.value = '';
        clearImage();
    }

    sendBtn.onclick = handleSend;
    userInput.onkeydown = (e) => { if (e.key === 'Enter') handleSend(); };
</script>
</body>
</html>
